<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
      rel="icon" type="image/png" sizes="32x32"
      href="./images/favicon-32x32.png">
    <title>Frontend Mentor | QR code component</title>
  </head>
  <body>
    <main class="content">
      <h1 class="visually-hidden">Qr code component</h1>

      <article
        class="card"
        aria-labelledby="card-title"
        aria-describedby="card-description">
        <div class="card__wrapper-image">
          <img
            src="./images/image-qr-code.png"
            alt="QR code to frontendmentor.io"
            width="576"
            height="576">
        </div>
        <div class="card__body">
          <h2
            class="card__title"
            id="card-title">Improve your front-end skills by building
            projects</h2>
          <p
            class="card__description"
            id="card-description">Scan the QR code to visit Frontend Mentor and
            take your coding skills to the
            next level</p>
        </div>
      </article>
    </main>
  </body>
</html>
